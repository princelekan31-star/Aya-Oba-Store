
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYA OBA COLLECTION</title>
    <style>
        :root { --gold: #D4AF37; --cream: #fffcf7; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: var(--cream); margin: 0; color: var(--dark); padding-bottom: 80px; }
        header { text-align: center; padding: 30px 20px; background: white; border-bottom: 4px solid var(--gold); }
        h1 { font-size: 24px; letter-spacing: 5px; margin: 0; }
        
        /* Category Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; padding: 15px; overflow-x: auto; background: white; sticky: top; top: 0; z-index: 10; }
        .tab { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--gold); background: white; color: var(--gold); font-size: 12px; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--gold); color: white; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 10px; text-align: center; }
        .price { color: var(--gold); font-weight: bold; margin: 5px 0; }
        .add-btn { background: var(--dark); color: white; border: none; width: 100%; padding: 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        
        /* Cart Bar */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; visibility: hidden; }
        .checkout-btn { background: var(--gold); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>AYA OBA</h1>
    <div style="color:var(--gold); font-size:10px; letter-spacing:2px;">COLLECTION</div>
</header>

<div class="tabs" id="categoryTabs">
    <div class="tab active" onclick="filterCat('All')">All</div>
    <div class="tab" onclick="filterCat('Perfume')">Perfumes</div>
    <div class="tab" onclick="filterCat('Bags')">Bags</div>
    <div class="tab" onclick="filterCat('Shoes')">Shoes</div>
</div>

<div class="container" id="store"></div>

<div class="cart-bar" id="cartBar">
    <div id="cartCount">0 Items Selected</div>
    <button class="checkout-btn" onclick="sendOrder()">ORDER ON WHATSAPP</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCehs7OENqWla3LETVOak7--4VLtXKpypY",
        authDomain: "aya-oba---collection.firebaseapp.com",
        projectId: "aya-oba---collection",
        storageBucket: "aya-oba---collection.appspot.com",
        messagingSenderId: "291313623116",
        appId: "1:291313623116:web:1d01255b7a4664deef54e9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allProducts = [];
    let cart = [];

    // Fetch Data
    onSnapshot(query(collection(db, "products"), orderBy("timestamp", "desc")), (snap) => {
        allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderStore(allProducts);
    });

    function renderStore(products) {
        const store = document.getElementById('store');
        store.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.image}">
                <div class="card-body">
                    <div style="font-size:13px; font-weight:bold;">${p.name}</div>
                    <div class="price">₦${p.price.toLocaleString()}</div>
                    <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">ADD TO CART</button>
                </div>
            </div>
        `).join('');
    }

    window.filterCat = (cat) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        if(cat === 'All') return renderStore(allProducts);
        renderStore(allProducts.filter(p => p.category === cat));
    };

    window.addToCart = (name, price) => {
        cart.push({ name, price });
        document.getElementById('cartBar').style.visibility = 'visible';
        document.getElementById('cartCount').innerText = cart.length + " Items in Cart";
    };

    window.sendOrder = () => {
        let total = cart.reduce((sum, item) => sum + item.price, 0);
        let list = cart.map(item => `- ${item.name} (₦${item.price.toLocaleString()})`).join('%0A');
        let msg = `Hello Aya Oba! I want to order:%0A${list}%0A%0A*Total: ₦${total.toLocaleString()}*`;
        window.open(`https://wa.me/2348128663733?text=${msg}`);
        cart = [];
        document.getElementById('cartBar').style.visibility = 'hidden';
    };
</script>
</body>
</html>
