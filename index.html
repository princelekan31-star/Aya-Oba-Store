
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYA OBA COLLECTION</title>
    <style>
        :root { --gold: #D4AF37; --cream: #fffcf7; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: var(--cream); margin: 0; color: var(--dark); }
        header { text-align: center; padding: 40px 20px; background: white; border-bottom: 4px solid var(--gold); }
        h1 { font-size: 28px; letter-spacing: 5px; margin: 0; font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 12px; text-align: center; }
        .price { color: var(--gold); font-weight: bold; margin: 5px 0 10px 0; }
        .buy-btn { background: var(--dark); color: white; text-decoration: none; display: block; padding: 10px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .tag { position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,0.9); padding: 3px 8px; border-radius: 5px; font-size: 9px; font-weight: bold; color: var(--gold); border: 1px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <h1>AYA OBA</h1>
    <div style="color:var(--gold); font-size:12px; letter-spacing:2px;">COLLECTION</div>
</header>

<div class="container" id="store"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCehs7OENqWla3LETVOak7--4VLtXKpypY",
        authDomain: "aya-oba---collection.firebaseapp.com",
        projectId: "aya-oba---collection",
        storageBucket: "aya-oba---collection.appspot.com",
        messagingSenderId: "291313623116",
        appId: "1:291313623116:web:1d01255b7a4664deef54e9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(query(collection(db, "products"), orderBy("timestamp", "desc")), (snap) => {
        const store = document.getElementById('store');
        store.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            store.innerHTML += `
                <div class="card">
                    <div class="tag">${p.category}</div>
                    <img src="${p.image}" onerror="this.src='https://via.placeholder.com/200?text=Image+Loading'">
                    <div class="card-body">
                        <div style="font-size:13px; font-weight:bold;">${p.name}</div>
                        <div class="price">₦${p.price.toLocaleString()}</div>
                        <a href="https://wa.me/2348128663733?text=Hello%20Aya%20Oba,%20I%20want%20to%20buy%20${encodeURIComponent(p.name)}" class="buy-btn">ORDER ON WHATSAPP</a>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
